name: Finance Seer CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

# Force Node.js 24 for future-proofing
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # ====== PHASE 1: DEPENDENCIES & LINTING ======
  dependencies-and-lint:
    name: Dependencies & Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install Node dependencies
      run: npm ci --legacy-peer-deps

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Run ESLint (if available)
      run: npm run lint 2>/dev/null || echo "No lint script configured"

    - name: Check Python syntax
      run: python -m py_compile scripts/*.py || echo "Some Python files have syntax issues"

  # ====== PHASE 2: UNIT TESTS ======
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: dependencies-and-lint

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install Node dependencies
      run: npm ci --legacy-peer-deps

    - name: Run Unit Tests
      run: node tests/run-all-tests.js

  # ====== PHASE 3: INTEGRATION TESTS ======
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install Node dependencies
      run: npm ci --legacy-peer-deps

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Run Integration Tests
      run: node tests/run-integration-tests.js
      # Removed: continue-on-error: true - tests MUST pass for deployment

  # ====== PHASE 4: DEPLOYMENT CHECK ======
  deployment-check:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
    - name: Check Deployment Readiness
      run: |
        echo "================================="
        echo "✅ DEPLOYMENT APPROVED"
        echo "All tests passed successfully!"
        echo "================================="

  # ====== TELEGRAM NOTIFICATION ======
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [deployment-check]
    if: always()

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Send Telegram Notification
      run: node scripts/send-ci-notification.js
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        DEPLOYMENT_RESULT: ${{ needs.deployment-check.result }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
