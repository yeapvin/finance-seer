name: Finance Seer CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  # ====== PHASE 1: DEPENDENCIES & LINTING ======
  dependencies-and-lint:
    name: Dependencies & Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v5
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install Node dependencies
      run: npm ci --legacy-peer-deps

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Run ESLint (if available)
      run: npm run lint 2>/dev/null || echo "No lint script configured"

    - name: Check Python syntax
      run: python -m py_compile scripts/*.py || echo "Some Python files have syntax issues"

  # ====== PHASE 2: UNIT TESTS ======
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: dependencies-and-lint
    outputs:
      unit_passed: ${{ steps.parse.outputs.passed }}
      unit_total: ${{ steps.parse.outputs.total }}

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install Node dependencies
      run: npm ci --legacy-peer-deps

    - name: Run Unit Tests
      id: run
      shell: bash
      run: set -o pipefail; node tests/run-all-tests.js 2>&1 | tee /tmp/unit-test-output.txt

    - name: Parse test results
      id: parse
      if: always()
      run: |
        PASSED=$(grep -oP 'Passed: \K[0-9]+' /tmp/unit-test-output.txt | tail -1 || echo 0)
        TOTAL=$(grep -oP 'Total:  \K[0-9]+' /tmp/unit-test-output.txt | tail -1 || echo 0)
        echo "passed=${PASSED}" >> $GITHUB_OUTPUT
        echo "total=${TOTAL}" >> $GITHUB_OUTPUT
        echo "Unit tests: ${PASSED}/${TOTAL}"

  # ====== PHASE 3: INTEGRATION TESTS ======
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      int_passed: ${{ steps.parse.outputs.passed }}
      int_total: ${{ steps.parse.outputs.total }}

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v5
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install Node dependencies
      run: npm ci --legacy-peer-deps

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Run Integration Tests
      id: run
      shell: bash
      run: set -o pipefail; node tests/run-integration-tests.js 2>&1 | tee /tmp/int-test-output.txt

    - name: Parse test results
      id: parse
      if: always()
      run: |
        PASSED=$(grep -oP 'Passed: \K[0-9]+' /tmp/int-test-output.txt | tail -1 || echo 0)
        TOTAL=$(grep -oP 'Total:  \K[0-9]+' /tmp/int-test-output.txt | tail -1 || echo 0)
        echo "passed=${PASSED}" >> $GITHUB_OUTPUT
        echo "total=${TOTAL}" >> $GITHUB_OUTPUT
        echo "Integration tests: ${PASSED}/${TOTAL}"

  # ====== PHASE 4: DEPLOY (gated on tests passing) ======
  deployment-check:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install Node dependencies
      run: npm ci --legacy-peer-deps

    - name: Deploy to Vercel (tests passed)
      run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Confirm deployment
      run: |
        echo "================================="
        echo "✅ DEPLOYED TO PRODUCTION"
        echo "Unit:        ${{ needs.unit-tests.outputs.unit_passed }}/${{ needs.unit-tests.outputs.unit_total }}"
        echo "Integration: ${{ needs.integration-tests.outputs.int_passed }}/${{ needs.integration-tests.outputs.int_total }}"
        echo "================================="

  # ====== TELEGRAM NOTIFICATION ======
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [deployment-check, unit-tests, integration-tests]
    if: always()

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Send Telegram Notification
      run: node scripts/send-ci-notification.js
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        DEPLOYMENT_RESULT: ${{ needs.deployment-check.result }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        UNIT_PASSED: ${{ needs.unit-tests.outputs.unit_passed }}
        UNIT_TOTAL: ${{ needs.unit-tests.outputs.unit_total }}
        INT_PASSED: ${{ needs.integration-tests.outputs.int_passed }}
        INT_TOTAL: ${{ needs.integration-tests.outputs.int_total }}
